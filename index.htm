<!DOCTYPE html>

<html>

<head>
<meta charset="utf-8">
<title>WebGIS Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
}

#map{
height:100vh;
width:100%;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// MAP
var map = L.map('map').setView([40.4093, 49.8671], 13);

// BASEMAP
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);


// ------------------- ROADS -------------------

fetch("merge.geojson")
.then(res => res.json())
.then(data => {

L.geoJSON(data,{

style:{
color:"red",
weight:2
},

onEachFeature:function(feature,layer){

var props = feature.properties;

var popup =
"<b>Layer:</b> " + (props.Name || "N/A") + "<br>" +
"<b>ID:</b> " + (props.id || "N/A");

layer.bindPopup(popup);

}

}).addTo(map)

})


// ------------------- POLYGON -------------------

fetch("mergepol.geojson")
.then(res => res.json())
.then(data => {

L.geoJSON(data,{

style:{
color:"green",
weight:1,
fillOpacity:0.2
},

onEachFeature:function(feature,layer){

var props = feature.properties;

var popup =
"<b>Layer:</b> " + (props.Name || "N/A");

layer.bindPopup(popup);

}

}).addTo(map)

})

</script>

</body>
</html>
